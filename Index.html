<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chef's Special Order System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/styles.css">
</head>

<body id="top" class="bg-light">

  <main class="container py-5 mb-5">

    <!-- Hero Section -->
    <header class="hero">
      <h1 class="mb-2">Chef’s Special Order System</h1>
      <p class="mb-0 small">
        Generate chef’s favourite meals based on available ingredients.
      </p>
    </header>

    <!-- Live Time + Ticket Stats Card -->
    <div class="card px-3 py-2 mb-4 d-flex flex-row justify-content-between align-items-center">
      <span id="currentTimeCard" class="fw-semibold"></span>
      <span id="ticketStatsCard" class="text-muted small">0 active • 0 closed</span>
    </div>

    <div class="row g-4">

      <!-- Left Column -->
      <div class="col-12 col-lg-5">

        <!-- New Ticket Section -->
        <section class="card p-4 mb-4" id="takingOrdersSection">
          <h2 class="h4 mb-3">New Kitchen Ticket</h2>
          <form id="orderForm">
            <label for="ingredient" class="form-label">Ingredient</label>
            <input type="text"
                   id="ingredient"
                   class="form-control mb-2"
                   placeholder="Enter ingredient (e.g. beef, chicken breast)"
                   required>
            <button type="submit" class="btn btn-primary">Add Ticket</button>
          </form>
          <div id="orderStatusMessage" class="mt-3" aria-live="polite"></div>
        </section>

        <!-- Close Ticket Section -->
        <section class="card p-4 mb-4" id="completeOrdersSection">
          <h2 class="h4 mb-3">Close Kitchen Ticket</h2>
          <form id="completeOrderForm">
            <label for="orderNumber" class="form-label">Ticket Number</label>
            <input type="number"
                   id="orderNumber"
                   class="form-control mb-2"
                   min="0"
                   placeholder="Enter ticket number to close"
                   required>
            <button type="submit" class="btn btn-success">Close Ticket</button>
          </form>
          <div id="closeStatusMessage" class="mt-3" aria-live="polite"></div>
        </section>

      </div>

      <!-- Right Column -->
      <div class="col-12 col-lg-7">
        <section class="card p-4 mb-4" id="displayOrdersSection">
          <h2 class="h4 mb-3">Active Kitchen Tickets</h2>
          <ul id="ordersList" class="list-unstyled mb-0"></ul>
        </section>
      </div>

    </div>

  </main>

  <!-- Back to Top Button (mobile only) -->
  <a href="#top"
     aria-label="Back to top"
     class="btn btn-secondary position-fixed bottom-0 end-0 m-4 d-md-none"
     style="z-index:1050;">
    ↑ Top
  </a>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-2 mt-5 small">
    <small>
      © <span id="year"></span> Andrew Wilkinson • Built with Bootstrap and TheMealDB API
    </small>
  </footer>

  <!-- Scripts -->
  <script src="JS/main.js"></script>
  <script src="JS/footer-year.js"></script>

</body>
</html>
